<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menu /</span> Resultado</h4>

<div id="tablaRegistro"></div>

<div class="modal fade" id="modalFormularioResultado" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="contenidoModalResultado"></div>
    </div>
</div>

<script>
    $(document).ready(function () {
        cargarTabla();
    });
    function cargarTabla() {
        $.ajax({
            type: 'POST',
            url: "/resultado/tablaRegistros",  // Ruta del metodo del controlador en Spring Boot
            success: function (response) {
                $("#tablaRegistro").html(response);  // Actualiza el contenido del div con la respuesta del servidor
            }
        });
    }

    function cargarFormulario() {
        cargarFormularioAlert("/resultado/formulario", "#contenidoModalResultado", "#formularioResultado");
    }

    function cargarFormularioEdit(id) {
        cargarFormularioEditAlert(id, "/resultado/formulario", "#contenidoModalResultado", "#formularioResultado");
    }

    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/resultado/eliminar", cargarTabla);
    }
</script>

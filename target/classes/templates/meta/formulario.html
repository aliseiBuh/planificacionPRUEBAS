<div class="modal-header">
  <h4 class="modal-title" th:text="${edit}? 'Modificar Meta' : 'Registrar Meta'"></h4>
  <a type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
</div>
<div class="modal-body">
  <div class="card animate__animated animate__fadeInUp" th:if="${edit != null}">
    <form id="formularioMeta" method="post" th:action="${edit}? @{/meta/Modificar} : @{/meta/Registrar}" novalidate>
      <input type="hidden" name="idIndicador" id="idIndicador" th:value="${idIndicador}">
      <input type="hidden" th:if="${edit != null}" th:field="${meta.idMeta}">
      <div class="card-body">
        <div class="row">
          <div class="col-12 col-md-6">
            <label class="form-label" for="modalEditUserLastName">Gestion</label>
            <select class="form-select" th:field="${meta.gestion}" style="pointer-events: none;">
              <option th:each="gestion : ${gestiones}" th:selected="${gestion == meta.gestion}" th:value="${gestion}"
                th:text="${gestion}">
              </option>
            </select>
            <div class="valid-feedback">Correcto!</div>
            <div class="invalid-feedback">Porfavor Introduzca una Gestion de la linea base</div>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label" for="modalEditUserFirstName">Valor de la meta</label>
            <input type="text" class="form-control decimal-mask" placeholder="valor" th:field="${meta.resultadoDecimal}"
              required
              th:if="${meta.indicador.tipoCalculo.nombre == 'Porcentaje'}" />
            <input type="number" class="form-control" placeholder="valor" th:field="${meta.resultado}" min="0" required
              th:if="${meta.indicador.tipoCalculo.nombre == 'Entero' || meta.indicador.tipoCalculo.nombre == 'Promedio'}" />
            <div class="valid-feedback">Correcto!</div>
            <div class="invalid-feedback">Debe seleccionar a un valor de la meta anual.</div>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <div class="row">
          <div class="col-12">
            <input type="submit" class="btn btn-success" th:value="${edit}? 'Guardar Cambios': 'Guardar Registro'">
            <a type="submit" class="btn btn-secondary" style="color: white;"
              th:onclick="cargarFormularioMetasAnuales([[${idIndicador}]])">Cancelar</a>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="card">
    <div class="card-header">
      <h5>Metas Anuales Registradas</h5>
    </div>
    <div class="card-body">
      <div class="card-datatable table-responsive pt-0">
        <table class="datatables-basic table table-hover" id="data-tableMeta">
          <thead>
            <tr>
              <th>Gestion</th>
              <th>Valor</th>
              <th>Opciones</th>
            </tr>
          </thead>
          <tbody class="animate__animated animate__fast">
            <tr th:each="meta, cont: ${metas}">
              <th th:text="${meta.gestion}"></th>
              <th th:text="${meta.resultado}" th:if="${meta.indicador.tipoCalculo.nombre == 'Entero' || meta.indicador.tipoCalculo.nombre == 'Promedio'}"></th>
              <th th:text="${meta.resultadoDecimal}" th:if="${meta.indicador.tipoCalculo.nombre == 'Porcentaje' || meta.indicador.tipoCalculo.nombre == 'Promedio de Porcentaje'}"></th>
              <th>
                <button type="button" class="btn btn-sm btn-primary edit-btn"
                  th:onclick="cargarFormularioMetasAnualesEdit([[${meta.idMeta}]])">
                  <i class="fa-solid fa-pen-to-square"></i> Editar
                </button>
                <!-- <button type="button" class="btn btn-sm btn-danger" th:onclick="eliminarMeta([[${meta.idMeta}]], [[${idIndicador}]])">
                  <i class="fa-solid fa-trash"></i> Eliminar
                </button> -->
              </th>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  $(document).ready(function () {

    $('#data-tableMeta').DataTable({
      language: {
        "sProcessing": "Procesando...",
        "sLengthMenu": "Mostrar _MENU_ registros",
        "sZeroRecords": "No se encontraron resultados",
        "sInfo": "Mostrando registros del _START_ al _END_ de un total de _TOTAL_ registros",
        "sInfoEmpty": "Mostrando registros del 0 al 0 de un total de 0 registros",
        "sInfoFiltered": "(filtrado de un total de _MAX_ registros)",
        "sInfoPostFix": "",
        "sSearch": "Buscar:",
        "sUrl": "",
        "sInfoThousands": ",",
        "sLoadingRecords": "Cargando...",
        "oPaginate": {
          "sFirst": "Primero",
          "sLast": "Último",
          "sNext": "Siguiente",
          "sPrevious": "Anterior"
        },
        "oAria": {
          "sSortAscending": ": Activar para ordenar la columna de manera ascendente",
          "sSortDescending": ": Activar para ordenar la columna de manera descendente"
        }
      }
    });

    $('#formularioMeta').submit(function (event) {
      event.preventDefault();
      if (this.checkValidity() === false) {
        $(this).addClass('was-validated');
        return;
      }
      var form = $(this)[0];
      var formData = new FormData(form);

      $.ajax({
        type: 'POST',
        url: $(this).attr('action'),
        data: formData,
        contentType: false,  // No establecer el tipo de contenido aquí
        processData: false,  // No procesar los datos
        success: function (response) {
          if (response === 'Se realizó el registro correctamente') {
            cargarTabla();
            cargarFormularioMetasAnuales($('#idIndicador').val());
            //$('.modal').modal('hide');
            Swal.fire(
              'Registrado!',
              response + '.',
              'success'
            );
          } else {
            Swal.fire(
              'Imposible Registrar!',
              response,
              'error'
            );
          }

        },
        error: function (xhr, status, error) {
          Swal.fire(
            'Imposible Registrar!',
            'Ha ocurrido un error. Por favor, intenta nuevamente.' + xhr, status, error,
            'error'
          );
          console.error(error);
          // Manejo de errores
        }
      });
    });

  });
</script>

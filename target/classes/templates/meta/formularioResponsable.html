<div class="modal-header">
    <h4 class="modal-title">Responsable</h4>
    <a type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
</div>
<form id="formularioResponsable" method="post" th:action="@{/meta/AgregarResponsable}" novalidate>
    <input type="hidden" th:field="${indicador.idIndicador}">
    <div class="modal-body">
        <div class="row">
            <div class="col-12 col-md-12">
                <div class="d-flex justify-content-lg-between">
                    <label class="form-label" for="modalEditUserLastName">Unidad/Direccion Responsable</label>
                    <a class="btn btn-primary btn-sm" style="color: white;" onclick="abrirFormularioNuevoResponsable()"><i
                            class="fa fa-plus"></i> Agregar Unidad/Direccion</a>
                </div>
                <select id="selectResponsable" class="select2 form-select col-md-10"
                    th:field="${indicador.responsables}" multiple required>
                    <option th:each="unidad : ${unidades}" th:value="${unidad.idUnidadFuncional}"
                        th:selected="${unidad == indicador.responsables}" th:text="${unidad.nombre}">
                    </option>
                </select>
                <div class="valid-feedback">Correcto!</div>
                <div class="invalid-feedback">Porfavor Introduzca una Gestion de la linea base</div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <div class="row">
            <div class="col-12">
                <input type="submit" class="btn btn-success" th:value="${edit}? 'Guardar Cambios': 'Guardar Registro'">
                <a type="submit" class="btn btn-secondary" style="color: white;" data-bs-dismiss="modal">Cancelar</a>
            </div>
        </div>
    </div>
</form>

<script>
    $(document).ready(function () {
        $('#formularioResponsable').submit(function (event) {
            event.preventDefault();
            if (this.checkValidity() === false) {
                $(this).addClass('was-validated');
                return;
            }
            var form = $(this)[0];
            var formData = new FormData(form);

            $.ajax({
                type: 'POST',
                url: $(this).attr('action'),
                data: formData,
                contentType: false,  // No establecer el tipo de contenido aquí
                processData: false,  // No procesar los datos
                success: function (response) {
                    if (response === 'Se realizó el registro correctamente') {
                        cargarTabla();
                        $('.modal').modal('hide');
                        Swal.fire(
                            'Registrado!',
                            response + '.',
                            'success'
                        );
                    } else {
                        Swal.fire(
                            'Imposible Registrar!',
                            response,
                            'error'
                        );
                    }

                },
                error: function (xhr, status, error) {
                    Swal.fire(
                        'Imposible Registrar!',
                        'Ha ocurrido un error. Por favor, intenta nuevamente.' + xhr, status, error,
                        'error'
                    );
                    console.error(error);
                    // Manejo de errores
                }
            });
        });

    });

    function abrirFormularioNuevoResponsable() {
        Swal.fire({

            confirmButtonText: 'Guardar Registro'
        });

        Swal.fire({
            title: 'Registrar nueva Direccion/Unidad Responsable',
            showCancelButton: true,
            confirmButtonColor: '#3085d6',
            cancelButtonColor: '#d33',
            confirmButtonText: 'Agregar',
            html: `
  <div class="card-body">
    <form class="needs-validation" novalidate id="formularioNuevoResponsable" action="/meta/agregarUnidadSelect" method="post">
      <div class="row mb-3 ">
        <div class="col-md-12">
          <label class="form-label" for="bs-validation-name">Nombre</label>
          <input
            type="text"
            name="nombre"
            class="form-control"
            placeholder="Nombre de la Direccion/Unidad Funcional"
            required />
          <div class="valid-feedback">Correcto!</div>
          <div class="invalid-feedback">Por favor, Introduzca un nombre.</div>
        </div>
      </div>
    </form>
  </div>
                `
        }).then((result) => {
            if (result.isConfirmed) {
                var formData = $('#formularioNuevoResponsable').serialize();
                $.ajax({
                    type: 'POST',
                    url: $('#formularioNuevoResponsable').attr('action'),
                    data: formData,
                    contentType: 'application/x-www-form-urlencoded',
                    success: function (response) {
                        const selectResponsable = $('#selectResponsable');
                        const option = $('<option></option>')
                            .val(response[0])  // El valor del option es el ID del usuario
                            .text(response[1])  // El texto del option es el nombre completo del usuario
                            .prop('selected', true);  // Marcar esta opción como seleccionada

                        // Agregar la opción al <select>
                        selectResponsable.append(option);
                        Swal.fire(
                            'Registrado!',
                            'Se realizó el registro correctamente.',
                            'success'
                        );
                    },
                    error: function (xhr, status, error) {
                        console.log(error);
                    }
                });
            }
        });
    }

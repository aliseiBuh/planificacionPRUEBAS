<div class="modal-header">
  <h4 class="modal-title" >Linea Base</h4>
  <a type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
</div>
<form id="formularioIndicador" method="post" th:action="@{/meta/ModificarLineaBase}"
  novalidate>
  <input type="hidden" th:if="${edit != null}" th:field="${indicador.idIndicador}">
  <div class="modal-body">
    <div class="row">
      <div class="col-12 col-md-6">
        <label class="form-label" for="modalEditUserLastName">Gestion</label>
        <input type="text" class="form-control" placeholder="2000"th:field="${indicador.gestionBase}"
          required />
        <div class="valid-feedback">Correcto!</div>
        <div class="invalid-feedback">Porfavor Introduzca una Gestion de la linea base</div>
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label" for="modalEditUserFirstName">Valor de Linea Base</label>
        <input type="number" class="form-control" placeholder="2000"th:field="${indicador.lineaBase}" required />
        <div class="valid-feedback">Correcto!</div>
        <div class="invalid-feedback">Debe seleccionar a un valor de la linea base.</div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <div class="row">
      <div class="col-12">
        <input type="submit" class="btn btn-success" th:value="${edit}? 'Guardar Cambios': 'Guardar Registro'">
        <a type="submit" class="btn btn-secondary" style="color: white;" data-bs-dismiss="modal">Cancelar</a>
      </div>
    </div>
  </div>
</form>

<script>
  $(document).ready(function () {
    $('#formularioIndicador').submit(function (event) {
      event.preventDefault();
      if (this.checkValidity() === false) {
        $(this).addClass('was-validated');
        return;
      }
      var form = $(this)[0];
      var formData = new FormData(form);

      $.ajax({
        type: 'POST',
        url: $(this).attr('action'),
        data: formData,
        contentType: false,  // No establecer el tipo de contenido aquí
        processData: false,  // No procesar los datos
        success: function (response) {
          if (response === 'Se realizó el registro correctamente') {
            cargarTabla();
            $('.modal').modal('hide');
            Swal.fire(
              'Registrado!',
              response + '.',
              'success'
            );
          } else {
            Swal.fire(
              'Imposible Registrar!',
              response,
              'error'
            );
          }

        },
        error: function (xhr, status, error) {
          Swal.fire(
            'Imposible Registrar!',
            'Ha ocurrido un error. Por favor, intenta nuevamente.' + xhr, status, error,
            'error'
          );
          console.error(error);
          // Manejo de errores
        }
      });
    });

  });
</script>

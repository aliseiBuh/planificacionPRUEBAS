<div class="card ">
    <div class="card-header d-flex justify-content-lg-between">
        <h5>Registros de politicas</h5>
        <button th:if="${#lists.contains(session.roles.![nombre], 'ADMINISTRADOR')}" type="button" class="btn btn-primary" onclick="cargarFormulario()" data-bs-toggle="modal"
                data-bs-target="#modalFormularioPersona">
            <i class="fa-solid fa-plus"></i> Agregar Politica
        </button>
    </div>
    <div class="card-datatable table-responsive pt-0">
        <table class="datatables-basic table table-hover" id="data-table">
            <thead>
            <tr>
                <th>Código</th>
                <th>Ponderación</th>
                <th>Descripcion</th>
                <th>Area</th>
                <th th:if="${#lists.contains(session.roles.![nombre], 'ADMINISTRADOR')}">Opciones</th>
            </tr>
            </thead>
            <tbody class="animate__animated animate__bounceInDown">
            <tr th:each="registro, cont: ${listaRegistros}" th:if="${registro.estado != 'ELIMINADO'}">
                <th>
                    <b th:text="${'COD PD'+registro.codigo}"></b>
                </th>
                <th th:text="${registro.ponderacion+'%'}"></th>
                <th th:text="${registro.descripcion}"></th>
                <th>
                    <b th:text="'AE '+${registro.area.codigo}+': '"></b>
                    "<span th:text="${registro.area.nombre}"></span>"
                </th>
                <th th:if="${#lists.contains(session.roles.![nombre], 'ADMINISTRADOR')}">
                    <button type="button" class="btn btn-sm btn-primary"
                            th:onclick="cargarFormularioEdit([[${registro.idPolitica}]])" data-bs-toggle="modal"
                            data-bs-target="#modalFormularioPersona">
                        <i class="fa-solid fa-pen-to-square"></i> Editar
                    </button>
                    <button type="button" class="btn btn-sm btn-danger" th:onclick="eliminar([[${'COD PD'+registro.codigo}]],[[${registro.idPolitica}]])">
                        <i class="fa-solid fa-trash"></i> Eliminar
                    </button>
                </th>
            </tr>
            </tbody>
        </table>
    </div>
</div>


<script>
    $('#data-table').DataTable({
        language: {
            "sProcessing": "Procesando...",
            "sLengthMenu": "Mostrar _MENU_ registros",
            "sZeroRecords": "No se encontraron resultados",
            "sInfo": "Mostrando registros del _START_ al _END_ de un total de _TOTAL_ registros",
            "sInfoEmpty": "Mostrando registros del 0 al 0 de un total de 0 registros",
            "sInfoFiltered": "(filtrado de un total de _MAX_ registros)",
            "sInfoPostFix": "",
            "sSearch": "Buscar:",
            "sUrl": "",
            "sInfoThousands": ",",
            "sLoadingRecords": "Cargando...",
            "oPaginate": {
                "sFirst": "Primero",
                "sLast": "Último",
                "sNext": "Siguiente",
                "sPrevious": "Anterior"
            },
            "oAria": {
                "sSortAscending": ": Activar para ordenar la columna de manera ascendente",
                "sSortDescending": ": Activar para ordenar la columna de manera descendente"
            }
        }
    });
</script>

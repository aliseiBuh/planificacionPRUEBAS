<div class="modal-header">
   <h4 class="modal-title">Proyección del Total</h4>
   <a type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
</div>
<form id="formularioIndicadorTotal" method="post" th:action="@{/meta/ModificarTotal}" novalidate>
   <input type="hidden" th:if="${edit != null}" th:field="${indicador.idIndicador}">
   <div class="modal-body">
      <div class="row">
         <div class="col-12 col-md-6">
            <label class="form-label" for="modalEditUserFirstName">Valor del total proyectado</label>
            <input type="text" class="form-control decimal-mask" placeholder="valor" th:field="${indicador.totalDecimal}"
               required th:if="${indicador.tipoCalculo.nombre == 'Porcentaje'}" />
            <input type="number" class="form-control" placeholder="valor" th:field="${indicador.total}" min="0" required
               th:if="${indicador.tipoCalculo.nombre == 'Entero' || indicador.tipoCalculo.nombre == 'Promedio'}" />
            <div class="valid-feedback">Correcto!</div>
            <div class="invalid-feedback">Debe introducir un valor total proyectado.</div>
         </div>
      </div>
   </div>
   <div class="modal-footer">
      <div class="row">
         <div class="col-12">
            <input type="submit" class="btn btn-success" th:value="${edit}? 'Guardar Cambios': 'Guardar Registro'">
            <a type="submit" class="btn btn-secondary" style="color: white;" data-bs-dismiss="modal">Cancelar</a>
         </div>
      </div>
   </div>
</form>

<script>
   $(document).ready(function () {
      $('#formularioIndicadorTotal').submit(function (event) {
         event.preventDefault();
         if (this.checkValidity() === false) {
            $(this).addClass('was-validated');
            return;
         }
         var form = $(this)[0];
         var formData = new FormData(form);

         $.ajax({
            type: 'POST',
            url: $(this).attr('action'),
            data: formData,
            contentType: false,  // No establecer el tipo de contenido aquí
            processData: false,  // No procesar los datos
            success: function (response) {
               if (response === 'Se realizó el registro correctamente') {
                  cargarTabla();
                  $('.modal').modal('hide');
                  Swal.fire(
                     'Registrado!',
                     response + '.',
                     'success'
                  );
               } else {
                  Swal.fire(
                     'Imposible Registrar!',
                     response,
                     'error'
                  );
               }

            },
            error: function (xhr, status, error) {
               Swal.fire(
                  'Imposible Registrar!',
                  'Ha ocurrido un error. Por favor, intenta nuevamente.' + xhr, status, error,
                  'error'
               );
               console.error(error);
               // Manejo de errores
            }
         });
      });

   });
</script>

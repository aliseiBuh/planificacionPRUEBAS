<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menu /</span>Reportes de Avances</h4>

<div class="card mb-3">
  <div class="card-body">
    <h5 class="card-title">Buscar Avances</h5>
    <p class="card-text">Visualización de los avances realizados por responsables.</p>
    <div class="row">
      <div class="col-md-12">
        <label for="">Unidad/Direccion</label>
        <select name="" id="selectUnidad" class="select2" onchange="cargarTabla(this.value)">
          <option th:each="unidad: ${unidades}" th:value="${unidad.idUnidadFuncional}"
          th:text="${unidad.nombre}"></option>
        </select>
      </div>
    </div>
  </div>
</div>

<div id="tablaRegistro"></div>

<div class="modal fade" id="modalFormularioPersona" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" id="contenidoModalIndicador"></div>
  </div>
</div>

<div class="modal fade" id="modalFormularioArchivo" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-xl">
    <div class="modal-content" id="contenidoModalArchivo"></div>
  </div>
</div>

<script>
  $(document).ready(function () {
    $('#selectUnidad').val('');
    recargarSelect();
  });

  function cargarTabla(unidad) {
    //const selectUnidad = $('#selectUnidad').val();
    $.ajax({
      type: 'POST',
      url: "/avance/tablaRegistrosAvancesEvaluar/"+unidad,  // Ruta del metodo del controlador en Spring Boot
      success: function (response) {
        $("#tablaRegistro").html(response);  // Actualiza el contenido del div con la respuesta del servidor
      }
    });
  }

  function cargarFormularioArchivo(id) {
    $.ajax({
      type: 'POST',
      url: "/avance/formularioAdjunto/"+id,
      success: function (response) {
        $("#contenidoModalArchivo").html(response);
      }
    });
  }

  function cargarFormularioEvaluacion(id) {
    $.ajax({
      type: 'POST',
      url: "/avance/formularioEvaluacion/"+id,
      success: function (response) {
        $("#contenidoModalIndicador").html(response);
      }
    });
  }

  function recargarSelect() {
    $('.select2').select2({
      placeholder: "Seleccione una opcion...",
      allowClear: true
    });
  }

</script>

<div class="modal-header">
  <h4 class="modal-title"
    th:text="${edit}? 'Modificar Asignación de Techo Presupuestario' : 'Registrar Asignación de Techo Presupuestario'">
  </h4>
  <a type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
</div>
<form id="formularioPresupuesto" method="post"
  th:action="${edit}? @{/techoPresupuestario/ModificarPresupuestario} : @{/techoPresupuestario/RegistrarPresupuestario}"
  novalidate>
  <input type="hidden" th:if="${edit != null}" th:field="${techoPresupuestario.idTechoPresupuesto}">
  <div class="modal-body">
    <div class="row">
      <div class="col-12 col-md-6">
        <label for="select2Basic" class="form-label">Unidad Funcional</label>
        <select id="select2Basic" class="select2 form-select form-select-lg"
          th:field="${techoPresupuestario.unidadFuncional}">
          <option th:each="unidad : ${unidades}" th:value="${unidad.idUnidadFuncional}"
            th:selected="${unidad == techoPresupuestario.unidadFuncional}"
            th:text="${unidad.nombre + ' - ' + unidad.sigla}">
          </option>
        </select>
        <div class="valid-feedback">Correcto!</div>
        <div class="invalid-feedback">Debe seleccionar a una unidad funcional.</div>
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label" for="modalEditUserFirstName">Monto</label>
        <input type="text" th:field="${techoPresupuestario.montoAsignado}" class="form-control"
          placeholder="Introduzca Monto" required />
        <div class="valid-feedback">Correcto!</div>
        <div class="invalid-feedback">Porfavor Introduzca un monto para asignar.</div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <div class="row">
      <div class="col-12">
        <input type="submit" class="btn btn-success" th:value="${edit}? 'Guardar Cambios': 'Guardar Registro'">
        <a type="submit" class="btn btn-secondary" style="color: white;" data-bs-dismiss="modal">Cancelar</a>
      </div>
    </div>
  </div>
</form>

<script>
  $(document).ready(function () {

    $('#formularioPresupuesto').submit(function (event) {
      event.preventDefault();
      if (this.checkValidity() === false) {
        $(this).addClass('was-validated');
        return;
      }
      var form = $(this)[0];
      var formData = new FormData(form);

      $.ajax({
        type: 'POST',
        url: $(this).attr('action'),
        data: formData,
        contentType: false,  // No establecer el tipo de contenido aquí
        processData: false,  // No procesar los datos
        success: function (response) {

          if (response === 'Se realizó el registro correctamente') {
            cargarTabla();
            cargarFormulario();
            if (response === 'Se realizó el registro correctamente') {
              Swal.fire(
                'Registrado!',
                response + '.',
                'success'
              );
            } else {
              Swal.fire(
                'Imposible Registrar!',
                response + '.',
                'error!'
              );
            }

          } else {
            Swal.fire(
              'Imposible Registrar!',
              response + '.',
              'error'
            );
          }

        },
        error: function (xhr, status, error) {
          Swal.fire(
            'Imposible Registrar!',
            'Ha ocurrido un error. Por favor, intenta nuevamente.' + xhr, status, error,
            'error'
          );
          console.error(error);
          // Manejo de errores
        }
      });
    });

  });
</script>

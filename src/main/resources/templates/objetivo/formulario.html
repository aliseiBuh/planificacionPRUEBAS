<div class="modal-header">
    <h4 class="modal-title" th:text="${edit}? 'Modificar Objetivo' : 'Registrar Objetivo'"></h4>
    <a type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
  </div>
  <form id="formularioObjetivo" method="post"
    th:action="${edit}? @{/objetivo/ModificarObjetivo} : @{/objetivo/RegistrarObjetivo}" novalidate>
    <input type="hidden" th:if="${edit != null}" th:field="${objetivo.idObjetivo}">
    <div class="modal-body">
      <div class="row">
        <div class="col-12 col-md-3">
          <label class="form-label" for="modalEditUserFirstName">Codigo</label>
          <input type="text" th:field="${objetivo.codigo}" class="form-control" placeholder="Introduzca Codigo" required />
          <div class="valid-feedback">Correcto!</div>
          <div class="invalid-feedback">Porfavor Introduzca un Codigo</div>
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label">Ponderación</label>
          <input type="number" class="form-control" placeholder="Introduzca codigo" th:field="${objetivo.ponderacion}">
          <div class="valid-feedback">Correcto!</div>
          <div class="invalid-feedback">Porfavor Introduzca codigo de la politica</div>
        </div>
        <div class="col-12 col-md-6">
            <label for="select2Basic" class="form-label">Politica</label>
            <select id="select2Basic" class="select2 form-select form-select-lg" data-allow-clear="true"
                th:field="${objetivo.politica}">
                <option value="">Seleccione una opción</option>
                <option th:each="politica : ${politicas}" th:value="${politica.idPolitica}"
                    th:selected="${politica == objetivo.politica}"
                    th:text="${politica.descripcion}">
                </option>
            </select>
            <div class="valid-feedback">Correcto!</div>
            <div class="invalid-feedback">Debe seleccionar a una politica.</div>
        </div>
        <div class="col-12 col-md-12">
          <label class="form-label" for="modalEditUserLastName">Descripción</label>
          <textarea th:field="${objetivo.descripcion}" class="form-control" placeholder="Introduzca una descripción" required></textarea>
          <div class="valid-feedback">Correcto!</div>
          <div class="invalid-feedback">Porfavor Introduzca una descripción.</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="row">
        <div class="col-12">
          <input type="submit" class="btn btn-success" th:value="${edit}? 'Guardar Cambios': 'Guardar Registro'">
          <a type="submit" class="btn btn-secondary" style="color: white;" data-bs-dismiss="modal" >Cancelar</a>
        </div>
      </div>
    </div>
  </form>
